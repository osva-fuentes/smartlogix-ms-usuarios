<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SmartLogix</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; }
        .product-card { transition: transform 0.3s; }
        .product-card:hover { transform: scale(1.05); }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="#">SmartLogix E-commerce</a>
        </div>
    </nav>

    <div class="container">
        <div class="row">
            <div class="col-md-4">
                <div class="card product-card shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title">Producto de Prueba</h5>
                        <p class="card-text">Stock disponible: <span id="stock-val">20</span></p>
                        <button class="btn btn-primary" onclick="comprar()">Comprar 1 Unidad</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function comprar() {
            // Llamada al microservicio Realizado.
            const response = await fetch('/api/inventario/descontar/1?cantidad=1', { method: 'POST' });
            if (response.ok) {
                alert("¡Compra exitosa! Patrones Strategy y Observer ejecutados.");
                // Aquí se podría actualizar el stock visualmente
            } else {
                alert("Error en la compra o stock insuficiente.");
            }
        }
    </script>
</body>
</html>
